<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 180">
  <defs>
    <radialGradient id="glow-l" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#C4A97D" stop-opacity="0.25" />
      <stop offset="40%" stop-color="#5B7B6A" stop-opacity="0.1" />
      <stop offset="100%" stop-color="#FAF8F5" stop-opacity="0" />
    </radialGradient>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400&amp;family=DM+Serif+Display&amp;display=swap');
      .brand-title-l {
        font-family: 'DM Serif Display', Georgia, serif;
        font-size: 56px;
        fill: #3D5C4B;
        letter-spacing: 0.12em;
      }
      .brand-tagline-l {
        font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
        font-size: 13px;
        font-weight: 300;
        fill: #5A5A5A;
        letter-spacing: 0.25em;
      }
    </style>
  </defs>

  <rect width="620" height="180" rx="16" fill="#FAF8F5" />
  <rect width="620" height="180" rx="16" fill="none" stroke="#E8E5E0" stroke-width="1"/>

  <!-- Estrella de 4 puntas -->
  <g transform="translate(20, 0)">
    <circle cx="90" cy="90" r="72" fill="url(#glow-l)" />
    <path d="M90,25 Q90,90 155,90 Q90,90 90,155 Q90,90 25,90 Q90,90 90,25 Z" fill="#5B7B6A" opacity="0.8"/>
    <circle cx="135" cy="45" r="2.5" fill="#C4A97D" opacity="0.5"/>
    <circle cx="42" cy="130" r="1.5" fill="#C4A97D" opacity="0.3"/>
  </g>

  <!-- LUCERNA -->
  <text x="210" y="100" class="brand-title-l">LUCERNA</text>

  <!-- Tagline -->
  <text x="214" y="128" class="brand-tagline-l">LUZ QUE TE ACOMPAÑA</text>
</svg>
