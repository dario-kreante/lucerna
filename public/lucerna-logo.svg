<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 180">
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FAF8F5" stop-opacity="1" />
      <stop offset="40%" stop-color="#C4A97D" stop-opacity="0.4" />
      <stop offset="100%" stop-color="#3D5C4B" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3D5C4B" />
      <stop offset="100%" stop-color="#2E4A3A" />
    </linearGradient>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400&amp;family=DM+Serif+Display&amp;display=swap');
      .brand-title {
        font-family: 'DM Serif Display', Georgia, serif;
        font-size: 56px;
        fill: #FAF8F5;
        letter-spacing: 0.12em;
      }
      .brand-tagline {
        font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
        font-size: 13px;
        font-weight: 300;
        fill: #C4A97D;
        letter-spacing: 0.25em;
      }
    </style>
  </defs>

  <rect width="620" height="180" rx="16" fill="url(#bg)" />

  <!-- Estrella de 4 puntas con resplandor -->
  <g transform="translate(20, 0)">
    <circle cx="90" cy="90" r="72" fill="url(#glow)" />
    <path d="M90,25 Q90,90 155,90 Q90,90 90,155 Q90,90 25,90 Q90,90 90,25 Z" fill="#FAF8F5" />
    <circle cx="135" cy="45" r="2.5" fill="#C4A97D" opacity="0.6"/>
    <circle cx="42" cy="130" r="1.5" fill="#C4A97D" opacity="0.4"/>
  </g>

  <!-- LUCERNA -->
  <text x="210" y="100" class="brand-title">LUCERNA</text>

  <!-- Tagline -->
  <text x="214" y="128" class="brand-tagline">LUZ QUE TE ACOMPAÑA</text>
</svg>
